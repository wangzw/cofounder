SKILL_NAME: "prd-analysis"
SKILL_VERSION: "0.1.0"
SKILL_DESCRIPTION: "Use when the user needs to create a Product Requirements Document from sparse notes or conversation — produces a multi-file PRD directory with journey specs, self-contained feature specs, and architecture topic files for AI coding agents to consume."
ARTIFACT_ROOT: "docs/raw/prd/"

# Prefilled consultant output — this test uses known prior knowledge about prd-analysis
# rather than a multi-turn dialogue. Exercises the downstream pipeline without
# requiring interactive user input.

generated_at: "2026-04-24T10:52:00Z"
consultant_trigger_reason: "glossary_hit + --interactive (test mode prefill)"

normalized_requirements:
  R-001:
    value: "prd-analysis"
    status: confirmed
  R-002:
    value: "document"
    status: confirmed
  R-003:
    value: |
      Artifact root: docs/raw/prd/YYYY-MM-DD-<product-slug>/
      Pyramid shape:
        README.md                        # product index + feature/journey list
        journeys/J-NNN-<slug>.md         # 1 file per user journey, self-contained
        features/F-NNN-<slug>.md         # 1 file per feature, self-contained (inlines data model + conventions)
        architecture.md                  # index only (~50-80 lines)
        architecture/<topic>.md          # tech-stack, data-model, coding-conventions, etc.
        REVISIONS.md                     # optional, only after first --revise
        prototypes/ (optional)           # runnable prototype source + screenshots
      Each feature file is self-contained — coding agents read one file to implement one feature.
    status: confirmed
  R-004:
    value: |
      Modes supported:
        - /prd-analysis              — interactive Q&A
        - /prd-analysis notes.md     — document-input mode (parse notes file, fill gaps via questions)
        - /prd-analysis --review docs/raw/prd/xxx/    — review existing PRD
        - /prd-analysis --revise docs/raw/prd/xxx/    — revise mode (change management)
        - /prd-analysis --evolve docs/raw/prd/xxx/ [notes.md]   — new iteration (delta-only output)
    status: confirmed
  R-005:
    value: |
      Structural (script-type) criteria needed for PRD artifacts:
        - PRD-S01 readme-frontmatter-complete (title, product name, date, stakeholders)
        - PRD-S02 features-have-ids (F-NNN format)
        - PRD-S03 journeys-have-ids (J-NNN format)
        - PRD-S04 feature-files-self-contained (no cross-refs to other feature files; data model + conventions inlined)
        - PRD-S05 architecture-index-matches-topic-files (no orphans, no missing)
        - PRD-S06 wikilink-targets-exist
        - PRD-S07 revisions-log-consistency (if REVISIONS.md exists)
        - PRD-S08 leaf-size-within-limit (no single file > 300 lines)
    status: confirmed
  R-006:
    value: |
      Semantic (LLM) criteria needed for PRDs:
        - PRD-L01 feature-to-journey-mapping (every feature maps to ≥1 journey touchpoint)
        - PRD-L02 mvp-discipline (pushed back on scope creep; no speculative features)
        - PRD-L03 feature-boundaries-clear (no overlap between features)
        - PRD-L04 non-functional-requirements-present (perf, security, a11y covered in architecture)
        - PRD-L05 cross-journey-patterns-identified (recurring themes surfaced in README)
    status: confirmed
  R-007:
    value: |
      Evolve mode is the primary new-version flow.
      Creates new date-prefixed directory (never mutates predecessor).
      Output contains ONLY delta files: new journeys, modified features, tombstones for deprecated ones.
      Unchanged features reference baseline via → baseline link.
      Immutability: if downstream implementation exists, cannot mutate in place.
    status: confirmed

