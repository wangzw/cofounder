# If your project already has a .gitlab-ci.yml, save this file as
# .gitlab/ci/lint-conventions.yml and add the following to your .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/ci/lint-conventions.yml'

stages:
  - lint

# NOTE: GitLab does not natively trigger pipelines on issue creation.
# To enable this job, configure a project webhook:
#   Settings > Webhooks > Add webhook
#   URL: https://gitlab.example.com/api/v4/projects/{id}/trigger/pipeline
#   Trigger: Issues events
#   Add variables: LINT_TARGET=issue, ISSUE_IID=$issue_iid
# See: https://docs.gitlab.com/ee/ci/triggers/
lint-issue:
  stage: lint
  image: node:22
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && $LINT_TARGET == "issue"
  before_script:
    - npm install -g @anthropic-ai/claude-code
    - curl -sL "https://gitlab.com/gitlab-org/cli/-/releases/permalink/latest/downloads/glab_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" | tar xz -C /usr/local/bin glab
  script:
    - |
      glab issue view "$ISSUE_IID" --output json > /tmp/issue.json

      cat > /tmp/prompt.txt <<'STATIC_EOF'
      You are a dev conventions linter. You MUST output valid JSON only, no other text.

      Given the following conventions:
      STATIC_EOF

      echo "---CONVENTIONS---" >> /tmp/prompt.txt
      cat CONTRIBUTING.md >> /tmp/prompt.txt

      cat >> /tmp/prompt.txt <<'STATIC_EOF'

      And the following issue content:
      STATIC_EOF

      echo "---CONTENT---" >> /tmp/prompt.txt
      cat /tmp/issue.json >> /tmp/prompt.txt

      cat >> /tmp/prompt.txt <<'STATIC_EOF'

      Check if the issue complies with the conventions (title format, required fields).
      If non-compliant, output corrected JSON: {"compliant": false, "title": "corrected title", "body": "corrected body", "labels": ["label"], "corrections": ["list of corrections made"]}
      If compliant, output: {"compliant": true}
      STATIC_EOF

      RESULT=$(claude -p "$(cat /tmp/prompt.txt)")
      echo "${RESULT}" > /tmp/result.json

      if ! jq -e '.compliant' /tmp/result.json >/dev/null 2>&1; then
        echo "WARNING: Claude output was not valid JSON. Skipping auto-correction."
        exit 0
      fi

      COMPLIANT=$(jq -r '.compliant' /tmp/result.json)

      if [ "$COMPLIANT" = "false" ]; then
        TITLE=$(jq -r '.title' /tmp/result.json)
        BODY=$(jq -r '.body' /tmp/result.json)
        CORRECTIONS=$(jq -r '.corrections | join("\n- ")' /tmp/result.json)

        glab issue update "$ISSUE_IID" --title "${TITLE}" --description "${BODY}"
        glab issue note "$ISSUE_IID" --message "**Auto-formatted by conventions linter:**

      - ${CORRECTIONS}

      See CONTRIBUTING.md for the full conventions guide."
      fi

lint-mr:
  stage: lint
  image: node:22
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - npm install -g @anthropic-ai/claude-code
    - curl -sL "https://gitlab.com/gitlab-org/cli/-/releases/permalink/latest/downloads/glab_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" | tar xz -C /usr/local/bin glab
  script:
    - |
      glab mr view "$CI_MERGE_REQUEST_IID" --output json > /tmp/mr.json

      cat > /tmp/prompt.txt <<'STATIC_EOF'
      You are a dev conventions linter. You MUST output valid JSON only, no other text.

      Given the following conventions:
      STATIC_EOF

      echo "---CONVENTIONS---" >> /tmp/prompt.txt
      cat CONTRIBUTING.md >> /tmp/prompt.txt

      cat >> /tmp/prompt.txt <<'STATIC_EOF'

      And the following merge request content:
      STATIC_EOF

