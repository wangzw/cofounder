name: Lint Pull Request

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  lint-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR content
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} \
            --json title,body,labels \
            --jq '.' > /tmp/pr.json

      - name: Lint and fix PR
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          cat > /tmp/prompt.txt <<'STATIC_EOF'
          You are a dev conventions linter. You MUST output valid JSON only, no other text.

          Given the following conventions:
          STATIC_EOF

          echo "---CONVENTIONS---" >> /tmp/prompt.txt
          cat CONTRIBUTING.md >> /tmp/prompt.txt

          cat >> /tmp/prompt.txt <<'STATIC_EOF'

          And the following pull request content:
          STATIC_EOF

          echo "---CONTENT---" >> /tmp/prompt.txt
          cat /tmp/pr.json >> /tmp/prompt.txt

          cat >> /tmp/prompt.txt <<'STATIC_EOF'

          Check if the PR complies with the conventions (title format, required sections: Summary, Related Issues, Changes, Test Plan).
          If non-compliant, output corrected JSON: {"compliant": false, "title": "corrected title", "body": "corrected body", "corrections": ["list of corrections made"]}
          If compliant, output: {"compliant": true}
          STATIC_EOF

          RESULT=$(claude -p "$(cat /tmp/prompt.txt)")
          echo "${RESULT}" > /tmp/result.json

      - name: Apply corrections
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! jq -e '.compliant' /tmp/result.json >/dev/null 2>&1; then
            echo "WARNING: Claude output was not valid JSON. Skipping auto-correction."
            exit 0
          fi

          COMPLIANT=$(jq -r '.compliant' /tmp/result.json)

          if [ "$COMPLIANT" = "false" ]; then
            TITLE=$(jq -r '.title' /tmp/result.json)
            BODY=$(jq -r '.body' /tmp/result.json)
            CORRECTIONS=$(jq -r '.corrections | join("\n- ")' /tmp/result.json)

            gh pr edit ${{ github.event.pull_request.number }} \
              --title "${TITLE}" \
              --body "${BODY}"

            gh pr comment ${{ github.event.pull_request.number }} \
              --body "**Auto-formatted by conventions linter:**

          - ${CORRECTIONS}

          See [CONTRIBUTING.md](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/CONTRIBUTING.md) for the full conventions guide."
          fi
