name: Question
description: Ask a question about the project
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is your question?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried or looked at so far?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information.
    validations:
      required: false
